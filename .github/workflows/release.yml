name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: adonai-supervisor-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: adonai-supervisor-aarch64-apple-darwin.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: adonai-supervisor-x86_64-apple-darwin.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build supervisor
        run: cargo build --release -p adonai-supervisor --target ${{ matrix.target }}

      - name: Package supervisor
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/adonai-supervisor-${{ matrix.target }}"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/adonai-supervisor" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "adonai-supervisor-${{ matrix.target }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/${{ matrix.archive }}" > "dist/${{ matrix.archive }}.sha256"
          else
            sha256sum "dist/${{ matrix.archive }}" > "dist/${{ matrix.archive }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256

  publish:
    name: Publish draft release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --draft \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Adonai alpha release. Verify artifacts before publishing."
